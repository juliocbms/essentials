spring:
  application:
    name: essentials
  datasource:
    url: ${URL_BANCO_DADOS}
    username: ${USER_BANCO_DADOS}
    password: ${USER_PASSWORD_BANCO_DADOS}
    driver-class-name: org.postgresql.Driver
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
spring-doc:
  paths-to-match: /users/**, /auth/**, /secret/**
  swagger-ui:
    use-root-path: true

api:
  security:
    master-key: ${SENTINEL_MASTER_KEY}
    token:
      secret: ${JWT_SECRET:my-super-secret-key-123}
