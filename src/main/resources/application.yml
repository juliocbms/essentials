spring:
  application:
    name: essentials
  datasource:
    url: jdbc:postgresql://localhost:5432/essentials
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

api:
  security:
    token:
      secret: ${JWT_SECRET:my-super-secret-key-123}