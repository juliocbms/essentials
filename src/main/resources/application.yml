spring:
  application:
    name: essentials
  datasource:
    url: jdbc:postgresql://localhost:5432/mysaas
    username: postgres
    password: manager
    driver-class-name: org.postgresql.Driver
  jpa:
    generate-dll: true
    dll-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


  flyway:
    enabled: true